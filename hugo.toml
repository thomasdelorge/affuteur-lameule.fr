baseURL = "https://affuteur-lameule.fr/"
locale = "fr-FR"
defaultContentLanguage = "fr"
title = "Affûteur LA MEULE"
theme = "lameule"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term", "RSS"]

[languages.fr]
  label = "Français"
  weight = 1

[params]
  brand = "Affûteur LA MEULE"
  artisan = "Jérémie JOUET"
  tagline = "Restez affûté."
  phone = "06 02 23 80 08"
  phoneHref = "tel:+33602238008"
  email = "contact@affuteur-lameule.fr"
  zone = "Maine-et-Loire & Deux-Sèvres"
  zoneDetail = "Lys-Haut-Layon / Nueil-les-Aubiers"
  mapsUrl = "https://maps.app.goo.gl/6B8nehasxDr69eMj6"
  facebook = "https://www.facebook.com/AffuteurLAMEULE"
  instagram = "https://www.instagram.com/affuteur_lameule"
  # Google Calendar embed — params limités (pas de CSS dans l'iframe)
  calendarEmbed = "https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=Europe%2FParis&hl=fr&showTitle=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0&bgcolor=%23F8F4EB&src=Y181YWQ2MzdiMDM3MjE2NzE2OTFmYzdjZWI5ZjEyNGI0N2ZlZjNmZDU1OWExM2RjM2QyMDA2YjZmOTM5ZjU1ODg2QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&color=%23FFAD46"
  videoId = "PHYnX07F2QM"
  # Asset paths for Hugo image processing (also mirrored under static/images for Decap)
  logo = "images/logo.png"
  logoLight = "images/logo-blanc.png"
  ogImage = "images/hero-clients.jpg"

[menus]
  [[menus.main]]
    name = "Ce que j'affûte"
    url = "/#services"
    weight = 1
  [[menus.main]]
    name = "Comment ça marche"
    url = "/#process"
    weight = 2
  [[menus.main]]
    name = "Pour qui"
    url = "/#audiences"
    weight = 3
  [[menus.main]]
    name = "Où me trouver"
    url = "/#ou-me-trouver"
    weight = 4

[markup.goldmark.renderer]
  unsafe = true

# Agent / LLM discovery — https://llmstxt.org/
[outputFormats.LLMS]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.HTMLMD]
  mediaType = "text/markdown"
  baseName = "index.html"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "LLMS", "HTMLMD"]
  page = ["HTML", "HTMLMD"]
