# Éditable — section vidéo / métier
title: "LE RÉMOULEUR EN ACTION."
text: |
  Fils d'un père affûteur et d'une mère couturière, j'ai fait de ma passion un métier :
  redonner du tranchant aux outils du quotidien et des professionnels.

  À bord de mon camion-atelier, je sillonne les marchés et salons du Maine-et-Loire
  et des Deux-Sèvres. Objectif : un service local, durable, contre le jetable.
image: "images/process-artisan.jpg"
image_alt: "Affûtage artisanal en action"
