{{ $v := hugo.Data.video }}
<section class="section section--dark" id="metier">
  <div class="container video__grid">
    <div class="video__copy">
      <p class="eyebrow eyebrow--light">En atelier</p>
      <h2 class="section__title section__title--light">{{ $v.title }}</h2>
      <div class="video__text">{{ $v.text | markdownify }}</div>
    </div>
    <div class="video__media">
      {{ with site.Params.videoId }}
        <div
          class="video__frame video__facade"
          data-youtube-facade
          data-youtube-id="{{ . }}"
          data-youtube-title="{{ $v.title }}">
          <button type="button" class="video__facade-btn" data-youtube-play>
            <img
              class="video__facade-poster"
              src="https://i.ytimg.com/vi/{{ . }}/hqdefault.jpg"
              alt=""
              width="480"
              height="360"
              loading="lazy"
              decoding="async">
            <span class="video__facade-play" aria-hidden="true">
              <svg viewBox="0 0 68 48" width="68" height="48"><path d="M66.52 7.74a8 8 0 0 0-5.63-5.66C55.63.9 34 0.9 34 0.9s-21.63 0-26.89 1.18A8 8 0 0 0 1.48 7.74 83.3 83.3 0 0 0 0 24a83.3 83.3 0 0 0 1.48 16.26 8 8 0 0 0 5.63 5.66C12.37 47.1 34 47.1 34 47.1s21.63 0 26.89-1.18a8 8 0 0 0 5.63-5.66A83.3 83.3 0 0 0 68 24a83.3 83.3 0 0 0-1.48-16.26z" fill="#f00"/><path d="M45 24 27 14v20" fill="#fff"/></svg>
            </span>
            <span class="visually-hidden">Lire la vidéo : {{ $v.title }}</span>
          </button>
        </div>
      {{ else }}
        <figure>
          {{ partial "responsive-image.html" (dict
            "src" $v.image
            "alt" $v.image_alt
            "widths" (slice 480 800 1200)
            "sizes" "(max-width: 900px) 100vw, 560px"
            "quality" 72
          ) }}
        </figure>
      {{ end }}
    </div>
  </div>
</section>
