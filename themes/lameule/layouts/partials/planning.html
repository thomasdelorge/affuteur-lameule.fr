{{ $l := hugo.Data.location }}
<section class="section section--cream section--planning" id="planning">
  <div class="container">
    <div class="planning__head">
      <h2 class="section__title">{{ $l.planning_title }}</h2>
      <div class="planning__actions">
        <a class="btn btn--accent" href="{{ site.Params.phoneHref | safeURL }}">{{ $l.planning_cta }}</a>
        <a class="btn btn--dark" href="mailto:{{ site.Params.email }}">{{ $l.event_cta }}</a>
      </div>
    </div>
    <div class="calendar-wrap">
      <div class="calendar-wrap__frame">
        <iframe
          src="{{ site.Params.calendarEmbed | safeURL }}"
          title="Planning des marchés et permanences"
          loading="lazy"
          width="100%"
          height="620"
          frameborder="0"
          scrolling="no"></iframe>
      </div>
    </div>
  </div>
</section>
