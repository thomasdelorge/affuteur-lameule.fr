<script>
  (function () {
    function loadYouTube(root) {
      if (!root || root.dataset.loaded === "1") return;
      var id = root.getAttribute("data-youtube-id");
      if (!id) return;
      root.dataset.loaded = "1";
      var title = root.getAttribute("data-youtube-title") || "YouTube video";
      var iframe = document.createElement("iframe");
      iframe.src =
        "https://www.youtube-nocookie.com/embed/" +
        encodeURIComponent(id) +
        "?autoplay=1&rel=0";
      iframe.title = title;
      iframe.allow =
        "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      iframe.allowFullscreen = true;
      root.replaceChildren(iframe);
    }

    function loadCalendar(root) {
      if (!root || root.dataset.loaded === "1") return;
      var src = root.getAttribute("data-calendar-src");
      if (!src) return;
      root.dataset.loaded = "1";
      var title =
        root.getAttribute("data-calendar-title") || "Planning des marchés et permanences";
      var frame = document.createElement("div");
      frame.className = "calendar-wrap__frame";
      var iframe = document.createElement("iframe");
      iframe.src = src;
      iframe.title = title;
      iframe.loading = "lazy";
      iframe.width = "100%";
      iframe.height = "620";
      iframe.setAttribute("frameborder", "0");
      iframe.setAttribute("scrolling", "no");
      frame.appendChild(iframe);
      root.replaceChildren(frame);
    }

    document.addEventListener("click", function (event) {
      var play = event.target.closest("[data-youtube-play]");
      if (!play) return;
      var root = play.closest("[data-youtube-facade]");
      loadYouTube(root);
    });

    var calendar = document.querySelector("[data-calendar-lazy]");
    if (!calendar) return;

    if (!("IntersectionObserver" in window)) {
      loadCalendar(calendar);
      return;
    }

    var observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          loadCalendar(entry.target);
          observer.disconnect();
        });
      },
      { rootMargin: "200px 0px" }
    );
    observer.observe(calendar);
  })();
</script>
