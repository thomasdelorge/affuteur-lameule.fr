<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-header__brand" href="{{ "/" | relURL }}">
      {{ partial "logo.html" (dict "src" site.Params.logoLight "size" 80 "class" "site-header__logo") }}
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
      <span class="visually-hidden">Menu</span>
      <span></span><span></span><span></span>
    </button>

    <nav id="site-nav" class="site-nav" data-nav>
      <ul>
        {{ range site.Menus.main }}
          <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
        <li>
          <a class="btn btn--accent btn--sm btn--phone" href="{{ site.Params.phoneHref | safeURL }}">
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.13.81.36 1.6.7 2.34a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.74.34 1.53.57 2.34.7A2 2 0 0122 16.92z"/></svg>
            <span>{{ site.Params.phone }}</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
<script>
  (function () {
    var toggle = document.querySelector('[data-nav-toggle]');
    var nav = document.querySelector('[data-nav]');
    if (!toggle || !nav) return;
    toggle.addEventListener('click', function () {
      var open = nav.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  })();
</script>
